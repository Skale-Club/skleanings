<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>{{SEO_TITLE}}</title>
    <meta name="description" content="{{SEO_DESCRIPTION}}" />
    <meta name="robots" content="{{ROBOTS}}" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="google-site-verification" content="" />
    <link rel="canonical" href="{{CANONICAL_URL}}" />
    <link rel="alternate" hreflang="en-US" href="{{CANONICAL_URL}}" />
    <link rel="alternate" hreflang="x-default" href="{{CANONICAL_URL}}" />
    <meta property="og:title" content="{{SEO_TITLE}}" />
    <meta property="og:description" content="{{SEO_DESCRIPTION}}" />
    {{OG_IMAGE_BLOCK}}
    <meta property="og:type" content="{{OG_TYPE}}" />
    <meta property="og:locale" content="{{OG_LOCALE}}" />
    <meta property="og:site_name" content="{{OG_SITE_NAME}}" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />
    <meta name="twitter:card" content="{{TWITTER_CARD}}" />
    <meta name="twitter:title" content="{{SEO_TITLE}}" />
    <meta name="twitter:description" content="{{SEO_DESCRIPTION}}" />
    {{TWITTER_IMAGE_BLOCK}}
    <meta name="twitter:site" content="{{TWITTER_SITE}}" />
    <meta name="twitter:creator" content="{{TWITTER_CREATOR}}" />
    <meta name="format-detection" content="telephone=no" />
    <script id="ld-localbusiness" type="application/ld+json">{{JSON_LD}}</script>
    <link rel="icon" href="{{FAVICON_URL}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/loader.css">
  </head>
  <body>
    <div id="root"></div>
    <div id="initial-loader" style="position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background-color: white;">
      <div class="loader-dots">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
