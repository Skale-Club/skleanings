name: Recurring Bookings Generation

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read

concurrency:
  group: recurring-bookings-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout cron runner
        uses: actions/checkout@v6

      - name: Generate Recurring Bookings
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
          CRON_MAX_ATTEMPTS: "3"
          CRON_TIMEOUT_MS: "60000"
        run: node scripts/call-cron-endpoint.mjs "Recurring Booking Generation" "/api/recurring-bookings/cron/generate"

      - name: Send Recurring Booking Reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
          CRON_MAX_ATTEMPTS: "3"
          CRON_TIMEOUT_MS: "60000"
        run: node scripts/call-cron-endpoint.mjs "Recurring Booking Reminders" "/api/recurring-bookings/cron/send-reminders"
