name: Calendar Sync Worker

on:
  # Schedule disabled during Vercel→Hetzner migration. Re-enable after Hetzner is live and APP_URL is updated.
  # schedule:
  #   - cron: '*/5 * * * *'   # every 5 minutes (GH Actions minimum granularity)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read

concurrency:
  group: calendar-sync-worker
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4       # must complete before next 5-min tick
    steps:
      - name: Checkout cron runner
        uses: actions/checkout@v6

      - name: Run Calendar Sync Worker
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
          CRON_MAX_ATTEMPTS: "3"
          CRON_TIMEOUT_MS: "60000"
        run: node scripts/call-cron-endpoint.mjs "Calendar Sync Worker" "/api/integrations/calendar-sync/cron/run"
