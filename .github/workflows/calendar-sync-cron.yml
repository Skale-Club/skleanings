name: Calendar Sync Worker

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GH Actions minimum granularity)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4       # must complete before next 5-min tick
    steps:
      - name: Run Calendar Sync Worker
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "ERROR: CRON_SECRET secret is not configured"
            exit 1
          fi
          if [ -z "$APP_URL" ]; then
            echo "ERROR: APP_URL variable is not configured"
            exit 1
          fi

          APP_URL="${APP_URL%/}"
          echo "Triggering calendar sync worker at $(date -u)"

          RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
            "${APP_URL}/api/integrations/calendar-sync/cron/run" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 60)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Calendar sync cron failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Calendar sync worker completed successfully"
