name: Supabase Keepalive

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Write heartbeat via Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Missing required secrets: SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          RESPONSE_FILE="$(mktemp)"
          STATUS=$(curl -sS -o "${RESPONSE_FILE}" -w "%{http_code}" \
            -X POST \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            "${SUPABASE_URL}/rest/v1/system_heartbeats" \
            -d '{"source":"github-actions-rest","note":"keepalive"}')

          echo "Response status: ${STATUS}"

          if [ "${STATUS}" != "201" ]; then
            echo "Unexpected status code: ${STATUS}"
            cat "${RESPONSE_FILE}"
            exit 1
          fi

          echo "Heartbeat written successfully."
