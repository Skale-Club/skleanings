name: Booking Email Reminders

on:
  # Schedule disabled during Vercel→Hetzner migration. Re-enable after Hetzner is live and APP_URL is updated.
  # schedule:
  #   - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read

concurrency:
  group: booking-email-reminders
  cancel-in-progress: false

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout cron runner
        uses: actions/checkout@v6

      - name: Send 24h Email Reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
          CRON_MAX_ATTEMPTS: "3"
          CRON_TIMEOUT_MS: "60000"
        run: node scripts/call-cron-endpoint.mjs "Booking Email Reminders" "/api/integrations/email/cron/send-reminders"
