name: Blog Autopost

on:
  schedule:
    # Run every hour to check if a new post should be generated
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions UI
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read

concurrency:
  group: blog-autopost
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout cron runner
        uses: actions/checkout@v6

      - name: Generate Blog Post
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
          CRON_MAX_ATTEMPTS: "3"
          CRON_TIMEOUT_MS: "120000"
        run: node scripts/call-cron-endpoint.mjs "Blog Autopost" "/api/blog/cron/generate"
